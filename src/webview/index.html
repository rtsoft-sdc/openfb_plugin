<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'none'; img-src vscode-resource: https:; script-src 'unsafe-inline' vscode-resource:;"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FB Diagram</title>
</head>
<body style="margin:0; overflow:auto;">
  <canvas id="canvas" style="display: block; margin-top: 48px;"></canvas>

  <div id="toolbar">
    <button id="generateFbootBtn">Создать FBOOT</button>
    <button id="deployBtn">Деплой</button>
  </div>

  <style>
    /* Top full-width toolbar */
    #toolbar {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 48px;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: #f3f3f3;
      padding: 0 12px;
      border: 1px solid #ddd;
      border-bottom: 1px solid #ddd;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    }
    #toolbar button {
      padding: 8px 12px;
      border: 1px solid #bbb;
      background: #28a745;
      color: #fff;
      cursor: pointer;
      border-radius: 4px;
      font-family: Roboto, sans-serif;
    }
    #toolbar button:hover { background: #218838; }
    /* Collapsible section styles for side panels */
    .device-section-title-collapsible,
    .sidepanel-section-title-collapsible {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-weight: 600;
      color: #333;
      cursor: default;
    }
    .device-toggle,
    .side-toggle {
      width: 22px;
      height: 22px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      font-size: 12px;
      line-height: 1;
    }
    .device-toggle:focus,
    .side-toggle:focus {
      outline: none;
      box-shadow: 0 0 0 2px rgba(33,136,255,0.16);
      border-radius: 3px;
    }
    .device-item { padding: 2px 0; }
    .sidepanel-ports-container .sidepanel-item { padding-left: 18px; }
  </style>

  <script type="module" src="./main.js"></script>
</body>
</html>
